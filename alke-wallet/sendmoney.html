<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wallet - Enviar Dinero</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="css/sendmoney.css">
</head>
<body>
    <div class="container">
        <div class="card p-4">
            <h2 class="text-center mb-4">Enviar Dinero</h2>

            <div class="form-group">
                <input type="text" class="form-control" id="searchContact" placeholder="Buscar contacto por nombre...">
            </div>
            
            <button class="btn btn-outline-primary btn-block mb-3" data-toggle="modal" data-target="#modalContacto">
                + Agregar nuevo contacto
            </button>

            <h6>Contactos</h6>
            <ul id="contactList" class="list-group mb-3">
                <li class="list-group-item d-flex align-items-center contact-item">
                  <input type="radio" name="contacto" class="mr-3 select-contact">
                  <div>
                      <span class="contact-name font-weight-bold">John Doe</span>
                      <small class="d-block text-muted">Alias: john.doe</small>
                  </div>
                </li>
                <li class="list-group-item d-flex align-items-center contact-item">
                 <input type="radio" name="contacto" class="mr-3 select-contact">
                 <div>
                      <span class="contact-name font-weight-bold">Jane Smith</span>
                       <small class="d-block text-muted">Alias: jane.smith</small>
                 </div>
               </li>
            </ul>

            <div id="alert-container"></div>

            <button id="btn-enviar-dinero" class="btn btn-primary btn-block mb-2">Enviar dinero</button>
            <a href="menu.html" class="btn btn-secondary btn-block">Volver al Menú Principal</a>
        </div>
    </div>

    <div class="modal fade" id="modalContacto">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header"><h5 class="modal-title">Nuevo Contacto</h5></div>
          <div class="modal-body">
            <input type="text" id="nombre" class="form-control mb-2" placeholder="Nombre">
            <input type="text" id="cbu" class="form-control mb-2" placeholder="CBU">
            <input type="text" id="alias" class="form-control mb-2" placeholder="Alias">
          </div>
          <div class="modal-footer">
            <button class="btn btn-primary" id="btn-guardar">Guardar</button>
          </div>
        </div>
      </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/sendmoney.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wallet - Depositar</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="css/deposit.css">
</head>
<body>
  <div class="container">
    <div class="card p-4">
      <h2 class="text-center mb-4">Depositar</h2>
      
      <p class="text-center">Saldo actual: <strong>$<span id="currentBalance">0</span></strong></p>
      
      <div class="form-group">
        <label for="depositAmount">Monto a depositar:</label>
        <input type="number" class="form-control" id="depositAmount" placeholder="Ej: 5000">
      </div>
      
      <div id="alert-container"></div>
      
      <div class="d-grid gap-2">
        <button id="btn-depositar" class="btn btn-primary btn-block mb-2">Realizar depósito</button>
        <a href="menu.html" class="btn btn-secondary btn-block">Volver al Menú Principal</a>
      </div>
    </div>
  </div>

  <script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/deposit.js"></script>
</body>
</html>
